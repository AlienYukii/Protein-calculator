<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Lomamy-tools </title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #222222;
            --text-main: #E0E0E0;
            --accent: #FFB300; /* 工業黃 */
            --border-color: #444444;
            --danger: #ff4444;
            --success: #00c853;
        }
        body {
            font-family: 'Courier New', Consolas, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px dashed var(--accent);
            padding-bottom: 10px;
            margin-bottom: 30px;
            text-align: center;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }
        .card {
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            padding: 25px;
            width: 100%;
            max-width: 350px;
            box-shadow: 5px 5px 0px var(--border-color); /* 硬派陰影 */
            display: flex;
            flex-direction: column;
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--text-main);
            border-left: 5px solid var(--accent);
            padding-left: 10px;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #AAAAAA;
        }
        input, select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            background: #111111;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        /* 隱藏數字輸入框的上下箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #000;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: auto;
            transition: 0.1s;
        }
        button:hover {
            background: #e6a200;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .result-box {
            margin-top: 20px;
            padding: 12px;
            background: #111111;
            border: 1px dashed var(--accent);
            font-size: 0.95rem;
            color: var(--text-main);
        }
        .result-box span {
            display: block;
            margin-bottom: 5px;
        }
        .highlight {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.1rem;
        }
        .danger { color: var(--danger); }
        .success { color: var(--success); }
    </style>
</head>
<body>

    <h1>Yokiki TOOLBOX</h1>

    <div class="container">
        <div class="card">
            <h2>蛋白 CP 值 (100g)</h2>
            <div class="input-group">
                <label>總重量 (g)</label>
                <input type="number" id="weight1" placeholder="輸入總克數">
            </div>
            <div class="input-group">
                <label>總價格 (元)</label>
                <input type="number" id="price1" placeholder="輸入價格">
            </div>
            <div class="input-group">
                <label>每百克含蛋白質 (g)</label>
                <input type="number" id="protein100" placeholder="例如: 80">
            </div>
            <button onclick="calc100g()">計算 CP 值</button>
            <div class="result-box" id="result1">--</div>
        </div>

        <div class="card">
            <h2>蛋白 CP 值 (每份)</h2>
            <div class="input-group">
                <label>總重量 (g)</label>
                <input type="number" id="weight2" placeholder="輸入總克數">
            </div>
            <div class="input-group">
                <label>總價格 (元)</label>
                <input type="number" id="price2" placeholder="輸入價格">
            </div>
            <div class="input-group">
                <label>每份重量 (g)</label>
                <input type="number" id="servingSize" placeholder="例如: 35">
            </div>
            <div class="input-group">
                <label>每份含蛋白質 (g)</label>
                <input type="number" id="proteinPerServing" placeholder="例如: 26.8">
            </div>
            <button onclick="calcServing()">計算 CP 值</button>
            <div class="result-box" id="result2">--</div>
        </div>

        <div class="card">
            <h2>BTC 合約風險報酬計算 </h2>
            <div class="input-group">
                <label>方向</label>
                <select id="cryptoPos">
                    <option value="long">做多 (Long)</option>
                    <option value="short">做空 (Short)</option>
                </select>
            </div>
            <div class="input-group">
                <label>進場價格 (USDT)</label>
                <input type="number" id="entryPrice" placeholder="例如: 78000">
            </div>
            <div class="input-group">
                <label>槓桿倍數 (X)</label>
                <input type="number" id="leverage" placeholder="例如: 5">
            </div>
            <div class="input-group">
                <label>本金 (USDT)</label>
                <input type="number" id="marginAmount" placeholder="例如: 1000">
            </div>
            <div class="input-group">
                <label>目標價 (USDT)</label>
                <input type="number" id="targetPrice" placeholder="例如: 100000">
            </div>
            <button onclick="calcCrypto()">執行風險測試</button>
            <div class="result-box" id="resultCrypto">--</div>
        </div>


    <script>
        // 蛋白 CP 值計算 logic
        function calc100g() {
            const w = parseFloat(document.getElementById('weight1').value);
            const p = parseFloat(document.getElementById('price1').value);
            const p100 = parseFloat(document.getElementById('protein100').value);
            if (!w || !p || !p100) return document.getElementById('result1').innerHTML = '資料不齊全';
            const totalP = (w / 100) * p100;
            const pricePer100 = (p / totalP) * 100;
            document.getElementById('result1').innerHTML = `<span>每 100g 蛋白成本:</span><span class="highlight">$${pricePer100.toFixed(1)}</span>`;
        }

        function calcServing() {
            const w = parseFloat(document.getElementById('weight2').value);
            const p = parseFloat(document.getElementById('price2').value);
            const s = parseFloat(document.getElementById('servingSize').value);
            const ps = parseFloat(document.getElementById('proteinPerServing').value);
            if (!w || !p || !s || !ps) return document.getElementById('result2').innerHTML = '資料不齊全';
            const totalP = (w / s) * ps;
            const pricePer100 = (p / totalP) * 100;
            document.getElementById('result2').innerHTML = `<span>每 100g 蛋白成本:</span><span class="highlight">$${pricePer100.toFixed(1)}</span>`;
        }

        // BTC 合約 logic
        function calcCrypto() {
            const pos = document.getElementById('cryptoPos').value;
            const entry = parseFloat(document.getElementById('entryPrice').value);
            const lev = parseFloat(document.getElementById('leverage').value);
            const margin = parseFloat(document.getElementById('marginAmount').value);
            const target = parseFloat(document.getElementById('targetPrice').value);

            if (!entry || !lev || !margin || !target) return document.getElementById('resultCrypto').innerHTML = '輸入異常';

            let liqPrice = (pos === 'long') ? entry * (1 - (1 / lev)) : entry * (1 + (1 / lev));
            let profit = (pos === 'long') 
                ? margin * lev * ((target - entry) / entry)
                : margin * lev * ((entry - target) / entry);
            let roe = (profit / margin) * 100;

            document.getElementById('resultCrypto').innerHTML = `
                <span>爆倉價: <b class="danger">${liqPrice.toFixed(2)}</b></span>
                <span>目標獲利: <b class="${profit >= 0 ? 'success' : 'danger'}">${profit.toFixed(2)} USDT</b></span>
                <span>預估 ROE: <b class="${roe >= 0 ? 'success' : 'danger'}">${roe.toFixed(2)}%</b></span>
            `;
        }
    </script>
</body>
</html>
